version: "3.8"

services:
  tubeapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tubeapi
    restart: unless-stopped
    ports:
      - "${TUBEAPI_PORT:-8000}:8000"
    environment:
      - TUBEAPI_USER=${TUBEAPI_USER:-admin}
      - TUBEAPI_PASS=${TUBEAPI_PASS:-changeme}
      - TUBEAPI_PORT=${TUBEAPI_PORT:-8000}
      - TUBEAPI_TEMP_DIR=${TUBEAPI_TEMP_DIR:-/tmp/tubeapi}
      - TUBEAPI_FILE_TTL=${TUBEAPI_FILE_TTL:-3600}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TUBEAPI_PORT:-8000}/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 40s
